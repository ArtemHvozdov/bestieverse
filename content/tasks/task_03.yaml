text: |
  🔮 <b>WHAT IF...?</b>

  Трохи поностальгували – тепер час пофантазувати ✨

  Уяви, якби хмари були з мармеладу, коти керували метро, а твій холодильник щоночі писав тобі любовні листи…

  Здається, занадто поетично? 🤪
  Тоді давай щось ближче до реальності. Уяви, якби…

  1️⃣ <b>Якби ви були супергероїнями світу Marvel</b>,
  яка суперсила була б у кожної з вас?

  2️⃣ <b>Якби ви відкрили спільний бізнес</b>,
  що б це було і чому саме воно?

  3️⃣ <b>Якби ви мали спільний ритуал</b>,
  що б ви робили щоразу, коли збираєтеся разом?

  📌 <b>Правила ті самі</b>:
  Кнопка «Хочу відповісти»
  Відео 🎥 / Аудіо 🎧 / Текст ✍️

summary:
  type: text
  text: |
    Окей, це офіційно! У вас є:
    • суперсили
    • спільна справа
    • ритуал, який тримає цей світ разом

    Реальність трохи не встигає,
    але ми її не квапимо 💥
