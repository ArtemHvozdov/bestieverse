  text: |
    Дякую, леді. Я все опрацювала та впевнена: ваші відповіді допоможуть зробити прорив у нашому дослідженні і ми нарешті знайдемо відповідь на запитання:

    Чому якась подруга приходить у твоє життя, але не затримується, а якась безцеремонно: «Посунься, сіста, я з тобою тут надооооовго…» 

    <i>Bisous-bisous, Sophie Lapin</i> ❤️