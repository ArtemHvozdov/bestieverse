id: "task_12"
order: 12
type: admin_only
 
messages:
  - type: photo
    media_file: "tasks/task_12.gif"
    text: |
      🚀 <b>TO BE CONTINUED!</b>

      Доросле життя – це коли ти пів року плануєш зустріч із подругами, а потім ще два місяці її переносиш.

      [Раніше ж просто зустрічалися на перехресті посередині, правда?]

      Але якщо букати зустрічі з календарем буває важко, то <b>мріяти</b> про них – <b>легко</b>!

      📌 <b>Що робити?</b>

      1️⃣ Нижче список активностей
      Давайте сплануємо їх разом на наступні 365 днів!
      2️⃣ Запропонуй свої ідеї у чаті по кожному з семи пунктів
      Формат довільний
      3️⃣ Коли всі бесті висловляться,
      <b>Адміне, тисни «Хочу відповісти»</b>, і ми почнемо ✨
  - type: text_with_buttons
    text: |
      <b>Отже, за наступний рік ми мріємо
      ЗРОБИТИ РАЗОМ</b>:

      🏙️ Підкорити місто…
      🎨 Відвідати майстер-клас…
      🎶 Відкайфувати на концерті мрії…
      📸 Влаштувати фотосесію у стилі…
      🌈 Зібратися у барі в сукнях кольору…
      🛍️ Купити однакові…
      🌍 Будь-що божевільне з вашого списку…

      Протягом наступних 24 годин обговорюйте, сперечайтеся, міняйте рішення на ходу…

      Тут немає правильних відповідей – тільки ваші мрії без фільтрів! Адмін все підсумує і нашепоче мені на вушко 🗣🤩

questions:
  - id: "city"
    text: "🏙️ <b>Разом ми хочемо підкорити місто...</b>"
    button_label: "Поділитися мрією"

  - id: "concert"
    text: "🎶 <b>Разом ми хочемо відкайфувати на концерті мрії...</b>"
    button_label: "Поділитися мрією"

  - id: "master_class"
    text: "🎨 <b>Разом ми хочемо відвідати майстер-клас...</b>"
    button_label: "Поділитися мрією"

  - id: "photoshoot"
    text: "📸 <b>Разом ми хочемо влаштувати фотосесію у стилі...</b>"
    button_label: "Поділитися мрією"

  - id: "bar_outfit"
    text: "🌈 <b>Разом ми хочемо зібратися у барі в сукнях кольору...</b>"
    button_label: "Поділитися мрією"

  - id: "shopping"
    text: "🛍️ <b>Разом ми хочемо купити однакові...</b>"
    button_label: "Поділитися мрією"

  - id: "wild_card"
    text: "🌍 <b>Будь-що божевільне з вашого списку...</b>"
    button_label: "Поділитися мрією"

openai:
  prompt_template: |
    Створи вертикальний lifestyle-колаж для Instagram Stories у форматі 1080 × 1920 px (9:16).

    Загальний стиль
    Легкий, трендовий, playful girly aesthetic.
    Атмосфера — емоційна, надихаюча, про дружбу, спільні моменти та lifestyle.

    Композиція

    У центрі зверху розмісти заголовок:
    ЗРОБИТИ РАЗОМ

    Під заголовком текст:

    Підкорити місто: {{index .Answers "city"}}
    Відкайфувати на концерті: {{index .Answers "concert"}}
    Відвідати майстер-клас: {{index .Answers "master_class"}}
    Влаштувати фотосесію у стилі: {{index .Answers "photoshoot"}}
    Зібратися в барі в сукнях кольору: {{index .Answers "bar_outfit"}}
    Купити однакові: {{index .Answers "shopping"}}
    А ще: {{index .Answers "wild_card"}}

    У нижньому правому кутку підпис Bestieverse.

    Формат: Instagram Stories 1080x1920.

summary:
  type: openai_collage
  sending_text: "✨ Генеруємо ваш колаж мрій... 🎨"
  ready_text: |
    <b>Фінальний рівень: unlocked</b> 🏁✅

    Поставте цей <b>колаж</b> на заставку телефону. Нехай він щодня шепоче: <b>«Ви приголомшливі»</b> 💛

    А ще ніжно нагадує, що попереду 365 днів, аби здійснити всі ці мрії ✨
