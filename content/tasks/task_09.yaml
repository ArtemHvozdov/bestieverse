text: |
  🧩 <b>Я ОБИРАЮ ТЕБЕ ЗНОВУ</b>

  Уяви: ти сидиш на тому самому дивані Central Perk із серіалу «Друзі» ☕️
  Забігла в кав’ярню третьої хвилі за лате на мигдалевому. І тут поруч сідає ВОНА.
  Ви ще не знайомі.
  Але щось у повітрі вже шепоче:
  це може бути початок великої дружби.

  📌 <b>Твоє завдання – уявити нову першу зустріч і відповісти:</b>

  1️⃣ <b>Яким персонажем «Друзів» вона була б і чому?</b>
  (Рейчел? Моніка? Фібі? Чендлер у спідниці?)

  2️⃣ <b>Яка смішна або незручна ситуація сталася б із нею прямо в кафе?</b>
  Та сама дрібниця, після якої ви почали б сміятися разом.

  3️⃣ І головне:
  <b>За що ти б обрала її знову, навіть не знаючи всього, що буде далі?</b>
  Один короткий пункт. Щиро. Можна з жартом або абсурдом.

  Можеш відповісти у стилі Фібі Буфе – химерно, але від серця 😌
  Бо іноді дружба починається не з «Привіт», а з кави, оказії та сміху над нею 💛

  Відео 🎥 / Аудіо 🎧 / Текст ✍️

