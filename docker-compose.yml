services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: ${DB_NAME:-gamebot}
      MYSQL_USER: ${DB_USER:-gamebot}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - ${DB_PATH:-./data/mysql}:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  bot:
    build:
      context: .
      dockerfile: cmd/bot/Dockerfile
    depends_on:
      mysql:
        condition: service_healthy
    env_file: .env
    restart: unless-stopped

  notifier:
    build:
      context: .
      dockerfile: cmd/notifier/Dockerfile
    depends_on:
      mysql:
        condition: service_healthy
    env_file: .env
    restart: unless-stopped

  scheduler:
    build:
      context: .
      dockerfile: cmd/scheduler/Dockerfile
    depends_on:
      mysql:
        condition: service_healthy
    env_file: .env
    restart: unless-stopped
